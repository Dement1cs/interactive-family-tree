{% extends "base.html" %}

{% block title %}Add Person — Interactive Family Tree{% endblock %}

{% block content %}
<div class="page-section">
    <div class="person-topbar">
        <div class="person-topbar-left">
            <a class="btn-link" href="{{ url_for('persons', tree_id=tree_id) }}">Back to people</a>
            <a class="btn-link" href="{{ url_for('tree', tree_id=tree_id) }}">Back to tree</a>
        </div>
    </div>
</div>

<div class="form-card">
    <h2>Add new person</h2>

    <form action="{{ url_for('add_person_route', tree_id=tree_id) }}" method="post" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-section">
            <h3>Basic information</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="first_name">First name *</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>

                <div class="form-group">
                    <label for="middle_name">Middle name / Patronymic</label>
                    <input type="text" id="middle_name" name="middle_name">
                </div>

                <div class="form-group">
                    <label for="last_name">Last name</label>
                    <input type="text" id="last_name" name="last_name">
                </div>

                <div class="form-group">
                    <label for="maiden_name">Maiden name</label>
                    <input type="text" id="maiden_name" name="maiden_name">
                </div>

                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender">
                        <option value="">-- choose --</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Birth date</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="birth_day">Day</label>
                    <input type="number" id="birth_day" name="birth_day" min="1" max="31">
                </div>

                <div class="form-group">
                    <label for="birth_month">Month</label>
                    <input type="number" id="birth_month" name="birth_month" min="1" max="12">
                </div>

                <div class="form-group">
                    <label for="birth_year">Year</label>
                    <input type="number" id="birth_year" name="birth_year">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Death date</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="death_day">Day</label>
                    <input type="number" id="death_day" name="death_day" min="1" max="31">
                </div>

                <div class="form-group">
                    <label for="death_month">Month</label>
                    <input type="number" id="death_month" name="death_month" min="1" max="12">
                </div>

                <div class="form-group">
                    <label for="death_year">Year</label>
                    <input type="number" id="death_year" name="death_year">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>Additional information</h3>
            <div class="form-group">
                <label for="notes">Description / Notes</label>
                <textarea id="notes" name="notes" rows="5"></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save person</button>
            <a class="btn-link" href="{{ url_for('persons', tree_id=tree_id) }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
