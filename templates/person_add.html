{% extends "base.html" %}

{% block title %}Add Person — Interactive Family Tree{% endblock %}

{% block content %}
<h2>Add Person</h2>

<form action="{{ url_for('add_person_route', tree_id=tree_id) }}" method="post" class="person-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
        <label for="first_name">First name *</label><br>
        <input type="text" id="first_name" name="first_name" required>
    </div>

    <div>
        <label for="last_name">Last name</label><br>
        <input type="text" id="last_name" name="last_name">
    </div>

    <div>
        <label>Birth date</label><br>
        <input type="number" name="birth_day" placeholder="Day" min="1" max="31" style="width: 80px;">
        <input type="number" name="birth_month" placeholder="Month" min="1" max="12" style="width: 80px;">
        <input type="number" name="birth_year" placeholder="Year" min="1" max="9999" style="width: 100px;">
    </div>

    <div>
        <label>Death date</label><br>
        <input type="number" name="death_day" placeholder="Day" min="1" max="31" style="width: 80px;">
        <input type="number" name="death_month" placeholder="Month" min="1" max="12" style="width: 80px;">
        <input type="number" name="death_year" placeholder="Year" min="1" max="9999" style="width: 100px;">
    </div>

    <div>
        <label for="gender">Gender</label><br>
        <select name="gender" id="gender">
            <option value="">Unknown</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
    </div>

    <div>
        <label for="notes">Notes</label><br>
        <textarea id="notes" name="notes" rows="3"></textarea>
    </div>

    <button type="submit">Save</button>
</form>

<p><a href="{{ url_for('persons') }}">Back to list</a></p>
{% endblock %}
