{% extends "base.html" %}

{% block title %}Rename Tree — Interactive Family Tree{% endblock %}

{% block content %}
<div class="page-section">
    <div class="person-topbar">
        <div class="person-topbar-left">
            <a class="btn-link" href="{{ url_for('dashboard') }}">Back to dashboard</a>
            <a class="btn-link" href="{{ url_for('tree', tree_id=tree.id) }}">Back to tree</a>
        </div>
    </div>
</div>

<div class="form-card">
    <h2>Rename tree</h2>
    <p class="muted">Update the title of this family tree.</p>

    <form action="{{ url_for('edit_tree', tree_id=tree.id) }}" method="post" class="stack-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-section">
            <div class="form-group">
                <label for="title">Tree title</label>
                <input
                    type="text"
                    id="title"
                    name="title"
                    value="{{ tree.title }}"
                    required
                >
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Save changes</button>
            <a class="btn-link" href="{{ url_for('dashboard') }}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
