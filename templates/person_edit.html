{% extends "base.html" %}

{% block title %}Edit {{ person["first_name"] }} — Interactive Family Tree{% endblock %}

{% block content %}
<h2>Edit Person</h2>

<form action="{{ url_for('edit_person', person_id=person['id'], tree_id=tree_id) }}" method="post" class="person-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div>
        <label for="first_name">First name *</label><br>
        <input type="text" id="first_name" name="first_name" required
               value="{{ person['first_name'] }}">
    </div>

    <div>
        <label for="middle_name">Middle name / Patronymic</label><br>
        <input type="text" id="middle_name" name="middle_name" value="{{ person['middle_name'] or '' }}">
    </div>

    <div>
        <label for="last_name">Last name</label><br>
        <input type="text" id="last_name" name="last_name"
               value="{{ person['last_name'] or '' }}">
    </div>

    <div>
        <label for="maiden_name">Maiden name</label><br>
        <input type="text" id="maiden_name" name="maiden_name" value="{{ person['maiden_name'] or '' }}">
    </div>

    <div>
        <label>Birth date</label><br>
        <input type="number" name="birth_day" placeholder="Day" min="1" max="31" value="{{ person['birth_day'] or '' }}" style="width: 80px;">
        <input type="number" name="birth_month" placeholder="Month" min="1" max="12" value="{{ person['birth_month'] or '' }}" style="width: 80px;">
        <input type="number" name="birth_year" placeholder="Year" min="1" max="9999" value="{{ person['birth_year'] or '' }}" style="width: 100px;">
    </div>

    <div>
        <label>Death date</label><br>
        <input type="number" name="death_day" placeholder="Day" min="1" max="31" value="{{ person['death_day'] or '' }}" style="width: 80px;">
        <input type="number" name="death_month" placeholder="Month" min="1" max="12" value="{{ person['death_month'] or '' }}" style="width: 80px;">
        <input type="number" name="death_year" placeholder="Year" min="1" max="9999" value="{{ person['death_year'] or '' }}" style="width: 100px;">
    </div>

    <div>
        <label for="gender">Gender</label><br>
        <select name="gender" id="gender">
            <option value="" {{ (person["gender"] or "") == "" and "selected" or "" }}>Unknown</option>
            <option value="male" {{ (person["gender"] or "") == "male" and "selected" or "" }}>Male</option>
            <option value="female" {{ (person["gender"] or "") == "female" and "selected" or "" }}>Female</option>
        </select>
    </div>

    <div>
        <label for="notes">Notes</label><br>
        <textarea id="notes" name="notes" rows="3">{{ person['notes'] or '' }}</textarea>
    </div>

    <button type="submit">Save changes</button>
</form>

<p><a href="{{ url_for('person_detail', person_id=person['id'], tree_id=tree_id) }}">Back to profile</a></p>
{% endblock %}
