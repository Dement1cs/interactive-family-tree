<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Interactive Family Tree{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header class="main-header">
        <div class="container">
            <h1>Interactive Family Tree</h1>
            <nav>
                <a href="{{ url_for('index') }}">Home</a>
                <a href="{{ url_for('tree') }}">Family Tree</a>
                <a href="{{ url_for('persons') }}">Persons</a>
                {% if current_user.is_authenticated %}
                <form action="{{ url_for('logout') }}" method="post" style="display:inline; margin-left:10px;">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button type="submit">Logout</button>
                </form>
                {% else %}
                <a href="{{ url_for('login') }}">Login</a>
                <a href="{{ url_for('register') }}">Register</a>
                {% endif %}

                {% if current_user.is_authenticated %}
                    <a href="{{ url_for('dashboard') }}">Dashboard</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="main-content container">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>© 2025 Interactive Family Tree</p>
        </div>
    </footer>

</body>
</html>
