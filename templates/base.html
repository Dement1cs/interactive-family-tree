<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Interactive Family Tree{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="site-container site-header-inner">
            <div class="site-brand">
                <a href="{{ url_for('index') }}" class="site-brand-link">Interactive Family Tree</a>
            </div>

            <nav class="site-nav">
                <a class="site-nav-link" href="{{ url_for('index') }}">Home</a>

                {% if current_user.is_authenticated %}
                    <a class="site-nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>

                    <button type="button" class="btn" id="themeToggle">Toggle theme</button>

                    <form action="{{ url_for('logout') }}" method="post" class="inline-form">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn">Logout</button>
                    </form>
                {% else %}
                    <a class="site-nav-link" href="{{ url_for('login') }}">Login</a>
                    <a class="site-nav-link" href="{{ url_for('register') }}">Register</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="site-main">
        <div class="site-container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="site-footer">
        <div class="site-container">
            <p>© 2025 Interactive Family Tree</p>
        </div>
    </footer>

    <script>
        (function () {
            const savedTheme = localStorage.getItem("theme");

            if (savedTheme === "dark") {
                document.body.classList.add("dark-theme");
            }

            window.addEventListener("DOMContentLoaded", function () {
                const btn = document.getElementById("themeToggle");
                if (!btn) return;

                function updateButtonText() {
                    const isDark = document.body.classList.contains("dark-theme");
                    btn.textContent = isDark ? "Light mode" : "Dark mode";
                }

                btn.addEventListener("click", function () {
                    document.body.classList.toggle("dark-theme");

                    const isDark = document.body.classList.contains("dark-theme");
                    localStorage.setItem("theme", isDark ? "dark" : "light");

                    updateButtonText();
                });

                updateButtonText();
            });
        })();
    </script>
</body>
</html>
